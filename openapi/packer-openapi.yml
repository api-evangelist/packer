    hashicorp.cloud.operation.Operation:
      type: object
      properties:
        id:
          type: string
          description: 'id is the unique ID for this operation used in other RPC calls.

            This ID is only guaranteed to be unique within the region that

            the operation is running in.'
        state:
          $ref: '#/components/schemas/hashicorp.cloud.operation.Operation.State'
        error:
          $ref: '#/components/schemas/google.rpc.Status'
        response:
          $ref: '#/components/schemas/google.protobuf.Any'
        location:
          $ref: '#/components/schemas/hashicorp.cloud.location.Location'
        link:
