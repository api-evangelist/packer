          description: 'Specifies a page token to use to retrieve the next page. Set this to the

            `next_page_token` returned by previous list requests to get the next page of

            results. If set, `previous_page_token` must not be set.'
        previous_page_token:
          type: string
          description: 'Specifies a page token to use to retrieve the previous page. Set this to

            the `previous_page_token` returned by previous list requests to get the

            previous page of results. If set, `next_page_token` must not be set.'
      description: PaginationRequest are the parameters for a paginated list request.
    hashicorp.cloud.common.PaginationResponse:
      type: object
      properties:
        next_page_token:
          type: string
          description: 'This token allows you to get the next page of results for list requests.

            If the number of results is larger than `page_size`, use the

            `next_page_token` as a value for the query parameter `next_page_token` in

            the next request. The value will become empty when there are no more pages.'
        previous_page_token:
          type: string
          description: 'This token allows you to get the previous page of results for list

            requests. If the number of results is larger than `page_size`, use the

            `previous_page_token` as a value for the query parameter

            `previous_page_token` in the next request. The value will become empty when

            there are no more pages.'
      description: 'PaginationResponse is the response holding the page tokens for a paginated

        list response.'
    hashicorp.cloud.common.SortingRequest:
      type: object
      properties:
        order_by:
          type: array
          items:
            type: string
          description: "Specifies the list of per field ordering that should be used for sorting. \nThe order matters as rows\
            \ are sorted in order by fields and when the field\nmatches, the next field is used to tie break the ordering.\n\
            The per field default ordering is ascending.  \n\nThe fields should be immutabile, unique, and orderable. If the\
            \ field is\nnot unique, more than one sort fields should be passed.\n\nExample: oder_by=name,age desc,created_at\
            \ asc\nIn that case, 'name' will get the default 'ascending' order."
      description: SortingRequest are the parameters for a sorted list request.
    hashicorp.cloud.location.Link:
      type: object
      properties:
        type:
          type: string
          description: 'type is the unique type of the resource. Each service publishes a

            unique set of types. The type value is recommended to be formatted

            in "<org>.<type>" such as "hashicorp.hvn". This is to prevent conflicts

            in the future, but any string value will work.'
        id:
          type: string
          description: id is the identifier for this resource.
        uuid:
          type: string
          description: uuid is the unique UUID for this resource.
        location:
          $ref: '#/components/schemas/hashicorp.cloud.location.Location'
        description:
          type: string
          description: 'description is a human-friendly description for this link. This is

            used primarily for informational purposes such as error messages.'
      description: 'Link is used to uniquely reference any resource within HashiCorp Cloud.

        This can be conceptually considered a "foreign key".'
    hashicorp.cloud.location.Location:
      type: object
      properties:
