        created_at:
          type: string
          format: date-time
          description: CreatedAt is the timestamp of when the operation was first created.
        updated_at:
          type: string
          format: date-time
          description: UpdatedAt is the timestamp of when the operation was last updated.
      description: Operation represents a single operation.
    hashicorp.cloud.operation.Operation.State:
      type: string
      enum:
      - PENDING
      - RUNNING
      - DONE
      - QUEUED
      default: PENDING
      description: 'State is one of the states that an Operation can be in.


        The states are purposely coarse grained to make it easy to understand

        the operation state machine: pending => running => done. Or pending =>

