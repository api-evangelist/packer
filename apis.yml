aid: packer
name: Packer
description: >-
  Packer is an open-source tool by HashiCorp for creating identical machine
  images for multiple platforms from a single source configuration. It automates
  the creation of pre-configured virtual machine and container images. HCP
  Packer adds a hosted artifact registry with a REST API for tracking image
  metadata, versions, channels, and security signals.
